<script>
    const video = document.getElementById('trailerVideo');
    const logo = document.getElementById('videoPoster');
    const overlay = document.getElementById('videoOverlay');
    const btnSound = document.getElementById('unmuteBtn');
    const btnSkip = document.getElementById('skipIntroBtn');

    if (video) {
        video.addEventListener('canplay', () => {
            video.style.opacity = '1';
            video.style.transform = 'scale(1)';
            setTimeout(() => {
                logo.style.opacity = '0';
                logo.style.transform = 'translate(-50%, -60%)';
                overlay.style.opacity = '0';
            }, 1500);
        });

        if (btnSound) {
            btnSound.addEventListener('click', () => {
                video.muted = false;
                video.currentTime = 0;
                video.play();
                btnSound.style.display = 'none';
            });
        }

        if (btnSkip) {
            btnSkip.addEventListener('click', () => {
                video.pause();
                video.currentTime = 0;
                $('.loader').fadeOut(600);
            });
        }

        video.addEventListener('ended', () => {
            $('.loader').fadeOut(600);
        });
    }
</script>
<script src="dark-creative/js/content.js"></script>
<script src="dark-creative/js/lang/pt.js"></script>
<script src="dark-creative/js/lang/en.js"></script>
<script>
function getValue(obj, path) {
    return path.split('.').reduce((o, k) => o?.[k], obj);
}

function applyLanguage(langData) {
    document.querySelectorAll('[data-lang]').forEach(el => {
        const key = el.getAttribute('data-lang');
        const value = getValue(langData, key);
        if (!value) return;
        if (typeof value === 'object' && value.prefix) {
            el.innerHTML = `${value.prefix} <span class="highlight">${value.highlight}</span> ${value.suffix}`;
        } else {
            el.innerHTML = value;
        }
    });

    document.querySelectorAll('[data-lang-placeholder]').forEach(el => {
        const key = el.getAttribute('data-lang-placeholder');
        const value = getValue(langData, key);
        if (value) el.placeholder = value;
    });
}

function setLanguage(lang) {
    const data = lang === 'en' ? LANG_EN : LANG_PT;
    applyLanguage(data);
    localStorage.setItem('lang', lang);
}

document.addEventListener('DOMContentLoaded', () => {
    const savedLang = localStorage.getItem('lang') || 'pt';
    setLanguage(savedLang);
});
</script>
